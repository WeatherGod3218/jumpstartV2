---

services:
  jumpstart:
    build: .
    container_name: Jumpstart
    ports:
      - "8000:8000"
    environment:
      - CALENDAR_URL=${CALENDAR_URL}
      - CALENDAR_OUTLOOK_DAYS=${CALENDAR_OUTLOOK_DAYS}
      - CALENDAR_EVENT_MAXIMUM=${CALENDAR_EVENT_MAXIMUM}
      - CALENDAR_TIMEZONE=${CALENDAR_TIMEZONE}